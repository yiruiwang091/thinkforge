services:
  - type: web
    name: thinkforge-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false          # 在 Render 控制台手动填写
      - key: USE_MOCK
        value: "false"
      - key: ALLOWED_ORIGINS
        sync: false          # 填写 Vercel 前端地址，如 https://thinkforge.vercel.app
      - key: PORT
        value: "8000"
    healthCheckPath: /health
